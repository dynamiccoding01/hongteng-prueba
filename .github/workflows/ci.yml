name: CI

on:
  push:
    branches: [main]
  pull_request:

# Si el CI falla, no se mergea. Ver README § Buenas prácticas.
jobs:
  verificar:
    name: Lint · Typecheck · Tests · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Formato
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ejemplo.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: clave-de-ejemplo-para-el-build
